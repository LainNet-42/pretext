    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; background: #040705; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      background:
        radial-gradient(circle at 50% 54%, rgba(116, 146, 102, 0.08), transparent 22%),
        radial-gradient(circle at 50% 54%, rgba(224, 232, 196, 0.05), transparent 10%),
        linear-gradient(180deg, #060a08 0%, #040705 48%, #030403 100%);
    }
    #art {
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 16px rgba(110, 146, 102, 0.08));
    }
    .r {
      display: block;
      white-space: pre;
      height: 15px;
      font: 13px/15px "SF Mono", "Cascadia Code", "Consolas", monospace;
      letter-spacing: 0.3px;
      user-select: none;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      #art {
        --fw: calc(100vw / 352);
        --fh: calc(100vh / 962);
        transform: scale(min(var(--fw), var(--fh)));
        transform-origin: center center;
      }
