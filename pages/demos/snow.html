<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snow</title>
  <style>
    *{box-sizing:border-box;margin:0}
    html,body{height:100%;overflow:hidden;background:#060810}
    body{display:flex;align-items:center;justify-content:center}
    #art{text-align:center}
    .r{display:block;white-space:pre;font:13px/15px "SF Mono","Cascadia Code","Consolas",monospace;height:15px;letter-spacing:0.4px}

    /* --- subtitle (white) --- */
    .s1{color:rgba(255,255,255,0.08)}.s2{color:rgba(255,255,255,0.30)}
    .s3{color:rgba(255,255,255,0.52)}.s4{color:rgba(255,255,255,0.72)}
    .s5{color:rgba(255,255,255,0.90)}.s6{color:#fff}

    /* --- crystal (ice blue -> white) --- */
    .cr1{color:rgba(140,200,255,0.22)}.cr2{color:rgba(160,215,255,0.40)}
    .cr3{color:rgba(180,228,255,0.58)}.cr4{color:rgba(200,238,255,0.74)}
    .cr5{color:rgba(220,245,255,0.88)}.cr6{color:rgba(245,252,255,0.98)}

    /* --- crystal glow (ambient around crystal) --- */
    .cg1{color:rgba(100,170,240,0.03)}.cg2{color:rgba(120,185,245,0.07)}
    .cg3{color:rgba(140,200,250,0.13)}

    /* --- snow particles (2 layers) --- */
    .sf1{color:rgba(180,195,220,0.15)}.sf2{color:rgba(185,200,225,0.28)}
    .sf3{color:rgba(190,205,230,0.40)}
    .sn1{color:rgba(230,240,255,0.45)}.sn2{color:rgba(240,246,255,0.65)}
    .sn3{color:rgba(245,250,255,0.82)}.sn4{color:rgba(250,253,255,0.95)}

    /* --- absorption particles (text -> crystal) --- */
    .ab1{color:rgba(220,240,255,0.90)}.ab2{color:rgba(200,230,255,0.75)}
    .ab3{color:rgba(180,220,255,0.58)}.ab4{color:rgba(160,210,255,0.40)}

    /* --- dissolution / rising vapor --- */
    .vp1{color:rgba(160,210,255,0.18)}.vp2{color:rgba(180,225,255,0.32)}
    .vp3{color:rgba(200,235,255,0.48)}.vp4{color:rgba(220,245,255,0.65)}

    /* --- final subtitle (warm white) --- */
    .fs1{color:rgba(255,248,235,0.0)}.fs2{color:rgba(255,248,235,0.30)}
    .fs3{color:rgba(255,250,240,0.55)}.fs4{color:rgba(255,252,245,0.78)}
    .fs5{color:rgba(255,254,250,0.94)}

    /* --- ground --- */
    .gd1{color:rgba(50,55,70,0.12)}.gd2{color:rgba(60,65,80,0.20)}
    .gd3{color:rgba(70,75,90,0.30)}

    /* --- noise --- */
    .n1{color:rgba(200,210,230,0.02)}.n2{color:rgba(200,210,230,0.04)}.n3{color:rgba(200,210,230,0.07)}

    /* --- CN subtitle --- */
    .cn{color:rgba(180,190,210,0.50)}
  </style>
</head>
<body>
  <div id="art"></div>
  <script type="module" src="./snow.ts"></script>
</body>
</html>
