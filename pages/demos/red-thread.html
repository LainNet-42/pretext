<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotus</title>
  <style>
    *{box-sizing:border-box;margin:0}
    html,body{height:100%;overflow:hidden;background:#050508}
    body{display:flex;align-items:center;justify-content:center}
    #art{text-align:center}
    .r{display:block;white-space:pre;font:14px/17px "SF Mono","Cascadia Code","Consolas",monospace;height:17px;letter-spacing:0.5px}
    /* water */
    .w1{color:rgba(70,120,170,0.08)}.w2{color:rgba(75,125,175,0.16)}
    .w3{color:rgba(80,135,185,0.28)}.w4{color:rgba(85,145,195,0.42)}
    .w5{color:rgba(90,155,210,0.58)}.w6{color:rgba(100,165,220,0.75)}
    /* rain drops */
    .d1{color:rgba(140,180,220,0.12)}.d2{color:rgba(150,190,230,0.25)}
    .d3{color:rgba(160,200,240,0.40)}
    /* ripple highlights */
    .p1{color:rgba(180,210,240,0.10)}.p2{color:rgba(185,215,245,0.22)}
    .p3{color:rgba(190,220,250,0.38)}.p4{color:rgba(200,230,255,0.55)}
    .p5{color:rgba(210,235,255,0.70)}.p6{color:rgba(220,240,255,0.85)}
    /* noise */
    .n1{color:rgba(255,255,255,0.02)}.n2{color:rgba(255,255,255,0.035)}.n3{color:rgba(255,255,255,0.05)}
    /* kanji - slightly brighter than surrounding to be subtly findable */
    .k1{color:rgba(140,170,200,0.10)}.k2{color:rgba(145,175,210,0.20)}
    .k3{color:rgba(150,180,215,0.32)}.k4{color:rgba(160,190,225,0.45)}
  </style>
</head>
<body>
  <div id="art"></div>
  <script type="module" src="./red-thread.ts"></script>
</body>
</html>
