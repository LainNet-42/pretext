<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pretext showcase: interactive fluid typography with mouse-tracked obstacles, two-column reflow, and multilingual text at 60fps.">
  <title>Liquid Flow -- Pretext Showcase</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      height: 100vh;
      overflow: hidden;
      background: #08080c;
      color: #e0dcd4;
    }
    body {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      cursor: crosshair;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ambient glow layer behind everything */
    #glow-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    .line {
      position: absolute;
      white-space: pre;
      z-index: 2;
      color: #d8d4cc;
      user-select: text;
      -webkit-user-select: text;
      will-change: transform;
      transition: opacity 80ms ease-out;
    }

    .headline-line {
      position: absolute;
      white-space: pre;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.6px;
      z-index: 3;
      user-select: text;
      -webkit-user-select: text;
    }

    .subtitle-line {
      position: absolute;
      white-space: pre;
      z-index: 3;
      color: rgba(255, 255, 255, 0.4);
      user-select: text;
      -webkit-user-select: text;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      will-change: transform;
    }

    .cursor-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      will-change: transform;
      transition: width 200ms ease-out, height 200ms ease-out;
    }

    .divider {
      position: absolute;
      z-index: 4;
      pointer-events: none;
    }

    .hud {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 100;
      font: 400 11px/1.4 "SF Mono", ui-monospace, monospace;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    .hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.18);
      z-index: 100;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 18px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 2s ease-out;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.28);
      text-decoration: none;
    }
    .back:hover { color: rgba(255, 255, 255, 0.5); }

    @media (max-width: 760px) {
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="glow-canvas"></canvas>
  </div>
  <div class="hint" id="hint">Move your cursor to reshape the text flow</div>
  <div class="hud" id="hud"></div>
  <a class="back" href="/demos/index">&larr; Demos</a>

  <script type="module" src="./fish.ts"></script>
</body>
</html>
