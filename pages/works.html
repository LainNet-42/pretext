<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRETEXT</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:     #0d0b08;
      --ink:    #f2ede0;
      --mute:   #7a756b;
      --faint:  #3a3630;
      --accent: #c9b68e;
    }
    html,body{
      background:var(--bg);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body{
      font-family:"Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      font-feature-settings:"palt" 1;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* fixed header */
    .mark{
      position:fixed;top:32px;left:40px;
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.38em;
      color:var(--mute);
      text-transform:uppercase;
      z-index:20;
      mix-blend-mode:difference;
    }
    .mark a{color:inherit;text-decoration:none}
    .ix{
      position:fixed;top:32px;right:40px;
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:var(--mute);
      text-transform:uppercase;
      z-index:20;
      mix-blend-mode:difference;
    }
    .ix a{color:inherit;text-decoration:none;border-bottom:1px solid transparent}
    .ix a:hover{border-bottom-color:currentColor}

    /* ============================================================
       One work = one full viewport, split 50/50
       ============================================================ */
    .work{
      min-height:100vh;
      padding:80px 72px 64px;
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;
      column-gap:48px;
      border-bottom:1px solid var(--faint);
      position:relative;
    }
    .work:last-of-type{border-bottom:none}

    /* ---- left column: huge kanji + meta ---- */
    .text{
      display:flex;
      flex-direction:column;
      justify-content:center;
      max-width:560px;
      margin-left:auto;
      padding-right:40px;
    }
    .label{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.40em;
      color:var(--mute);
      text-transform:uppercase;
      margin-bottom:40px;
      display:flex;align-items:center;gap:18px;
    }
    .label .n{color:var(--accent)}
    .label .line{flex:1;height:1px;background:var(--faint)}
    .kanji{
      font:200 min(26vh, 240px)/0.92
           "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      letter-spacing:0.02em;
      color:var(--ink);
      margin:0;
      padding:0;
      white-space:nowrap;
    }
    .romaji{
      margin-top:24px;
      font:11px/1.8 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.36em;
      color:var(--mute);
      text-transform:uppercase;
    }
    .rule{
      width:72px;height:1px;
      background:var(--mute);
      margin:32px 0 24px;
      opacity:0.45;
    }
    .blurb{
      font:14px/2 "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      color:var(--ink);
      max-width:30ch;
      opacity:0.82;
    }
    .meta{
      margin-top:40px;
      display:flex;gap:26px;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:var(--mute);
      text-transform:uppercase;
    }
    .meta span + span{position:relative;padding-left:26px}
    .meta span + span::before{
      content:"";
      position:absolute;left:0;top:50%;
      width:14px;height:1px;background:var(--faint);
      transform:translateY(-50%);
    }

    /* ---- right column: video ---- */
    .frame{
      justify-self:center;
      position:relative;
      height:min(82vh, 820px);
      aspect-ratio:9/16;
      cursor:pointer;
      background:#000;
      box-shadow:
        0 60px 120px -40px rgba(0,0,0,0.85),
        0 20px 40px -20px rgba(0,0,0,0.6);
      transition:transform .6s cubic-bezier(.2,.7,.2,1);
    }
    .frame:hover{transform:translateY(-4px)}
    .frame video{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
      display:block;
    }
    .frame .caption{
      position:absolute;
      left:0;right:0;bottom:-36px;
      text-align:center;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.32em;
      color:var(--mute);
      text-transform:uppercase;
      transition:color .3s, transform .3s;
      display:flex;justify-content:center;gap:22px;align-items:center;
    }
    .frame .caption .sep{color:var(--faint)}
    .frame .caption a{
      color:var(--mute);
      text-decoration:none;
      letter-spacing:0.32em;
    }
    .frame .caption a:hover{color:var(--ink)}
    .frame:hover .caption .play{color:var(--ink);transform:translateY(2px)}

    /* reverse on second work — video on left, text on right */
    .work.flip .text{
      margin-left:0;margin-right:auto;
      padding-right:0;padding-left:40px;
      order:2;
    }
    .work.flip .frame{order:1}

    /* ---- footer ---- */
    .foot{
      padding:40px 72px 56px;
      display:flex;align-items:center;justify-content:space-between;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:var(--faint);
      text-transform:uppercase;
      border-top:1px solid var(--faint);
    }

    /* ---- fullscreen player ---- */
    #player{
      position:fixed;inset:0;
      background:#000;
      display:none;
      align-items:center;justify-content:center;
      z-index:100;
    }
    #player.on{display:flex}
    #player video{
      height:100vh;width:auto;
      max-width:100vw;
      background:#000;
    }
    #player .close{
      position:fixed;top:24px;right:30px;
      font:11px/1 "SF Mono",monospace;
      letter-spacing:0.26em;
      color:rgba(255,255,255,0.55);
      text-transform:uppercase;
      cursor:pointer;
      background:none;border:none;padding:10px 14px;
    }
    #player .close:hover{color:#fff}

    /* ---- responsive: stack on narrow ---- */
    @media (max-width:900px){
      .work{
        grid-template-columns:1fr;
        padding:100px 28px 72px;
        row-gap:56px;
        min-height:auto;
      }
      .text{
        max-width:100%;
        padding:0;
        margin:0;
        order:2 !important;
      }
      .frame{
        order:1 !important;
        height:auto;
        width:min(320px,80vw);
      }
      .kanji{font-size:min(22vw, 180px)}
      .work.flip .text{order:2 !important}
      .work.flip .frame{order:1 !important}
      .mark{top:20px;left:22px}
      .ix{top:20px;right:22px}
      .foot{padding:32px 22px}
    }
  </style>
</head>
<body>

  <div class="mark"><a href="/">PRETEXT</a></div>
  <div class="ix"><a href="/demos">demos &rarr;</a></div>

  <section class="work">
    <div class="text">
      <div class="label"><span class="n">I</span><span class="line"></span><span>2025</span></div>
      <h2 class="kanji">水葬</h2>
      <div class="romaji">SUI &middot; SOU</div>
      <div class="rule"></div>
      <div class="blurb">字が水面に落ち、ひとひらの蓮を咲かせる。最後に、ひとつの灯。</div>
      <div class="meta">
        <span>ASCII</span>
        <span>22 sec</span>
        <span>vertical</span>
        <span>voice</span>
      </div>
    </div>
    <a class="frame" data-video="/output/final/ascii_growth.mp4" href="#">
      <video src="/output/final/ascii_growth.mp4#t=12" muted loop playsinline preload="metadata" autoplay></video>
      <div class="caption">
        <span class="play">play &nbsp;&rarr;</span>
        <span class="sep">&middot;</span>
        <a href="/output/final/ascii_growth.mp4" download="suisou.mp4" onclick="event.stopPropagation()">download &darr;</a>
      </div>
    </a>
  </section>

  <section class="work flip">
    <div class="text">
      <div class="label"><span class="n">II</span><span class="line"></span><span>2026</span></div>
      <h2 class="kanji">一番賞</h2>
      <div class="romaji">ICHIBAN &middot; KUJI</div>
      <div class="rule"></div>
      <div class="blurb">三度のレバー、三度の祈り。「梟、梟、梟。&hairsp;いた。」</div>
      <div class="meta">
        <span>ASCII</span>
        <span>49 sec</span>
        <span>vertical</span>
        <span>voice</span>
        <span>BGM</span>
      </div>
    </div>
    <a class="frame" data-video="/output/final/rei_slot.mp4" href="#">
      <video src="/output/final/rei_slot.mp4#t=18" muted loop playsinline preload="metadata" autoplay></video>
      <div class="caption">
        <span class="play">play &nbsp;&rarr;</span>
        <span class="sep">&middot;</span>
        <a href="/output/final/rei_slot.mp4" download="ichibankuji.mp4" onclick="event.stopPropagation()">download &darr;</a>
      </div>
    </a>
  </section>

  <footer class="foot">
    <div>&copy; PRETEXT</div>
    <div>selected works &nbsp;&middot;&nbsp; 2025&ndash;2026</div>
  </footer>

  <div id="player" role="dialog" aria-modal="true">
    <button class="close">close &nbsp;&times;</button>
    <video controls playsinline></video>
  </div>

  <script>
    const overlay = document.getElementById('player');
    const ov = overlay.querySelector('video');
    const closeBtn = overlay.querySelector('.close');
    function open(src){
      ov.src = src;
      ov.currentTime = 0;
      ov.muted = false;
      ov.volume = 1.0;
      overlay.classList.add('on');
      ov.play().catch(()=>{});
    }
    function close(){
      overlay.classList.remove('on');
      ov.pause();
      ov.removeAttribute('src');
      ov.load();
    }
    document.querySelectorAll('a.frame').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        open(a.dataset.video);
      });
    });
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
  </script>

</body>
</html>
