<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRETEXT &mdash; works</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      background:#06080a;
      color:#cbd2dc;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      -webkit-font-smoothing:antialiased;
      min-height:100%;
    }
    body{
      min-height:100vh;
      padding:48px 24px 80px;
      display:flex;flex-direction:column;align-items:center;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(40,46,62,0.35) 0%, transparent 70%),
        #06080a;
    }

    /* --- header --- */
    .head{
      width:min(960px,100%);
      display:flex;align-items:baseline;justify-content:space-between;
      margin-bottom:60px;
      padding:0 4px;
    }
    .head .mark{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.32em;
      color:#5a6478;
      text-transform:uppercase;
    }
    .head h1{
      font:300 14px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.5em;
      color:#9aa4b8;
      text-transform:uppercase;
    }
    .head .crumbs{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.18em;
      color:#3d4656;
    }
    .head .crumbs a{color:#5a6478;text-decoration:none;border-bottom:1px solid transparent}
    .head .crumbs a:hover{color:#aeb8c8;border-bottom-color:#aeb8c8}

    /* --- gallery grid --- */
    .gallery{
      width:min(960px,100%);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:48px;
    }
    @media (max-width:760px){
      .gallery{grid-template-columns:1fr;gap:64px}
      .head{margin-bottom:40px}
    }

    /* --- a single work --- */
    .work{
      display:block;
      text-decoration:none;
      color:inherit;
      position:relative;
    }
    .frame{
      position:relative;
      width:100%;
      aspect-ratio:9/16;
      background:#000;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;
      transition:border-color .35s ease;
    }
    .work:hover .frame{
      border-color:rgba(255,255,255,0.22);
    }
    .frame video{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
      display:block;
    }

    /* a faint vignette + scanlines so static frames look less raw */
    .frame::after{
      content:"";
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
      pointer-events:none;
      mix-blend-mode:overlay;
    }

    /* corner number — top-left of the frame */
    .num{
      position:absolute;
      top:14px;left:16px;
      font:600 11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.2em;
      color:rgba(220,230,245,0.78);
      text-shadow:0 0 6px rgba(0,0,0,0.6);
      z-index:2;
    }
    /* play hint — bottom-right */
    .hint{
      position:absolute;
      bottom:14px;right:16px;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:rgba(220,230,245,0.55);
      text-shadow:0 0 6px rgba(0,0,0,0.6);
      text-transform:uppercase;
      z-index:2;
      transition:color .25s;
    }
    .work:hover .hint{color:rgba(255,255,255,0.95)}

    /* meta block beneath the frame */
    .meta{
      margin-top:22px;
      padding:0 2px;
    }
    .meta .ji{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.32em;
      color:#5a6478;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .meta h2{
      font:300 38px/1 "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      letter-spacing:0.06em;
      color:#e8ecf3;
      margin-bottom:14px;
    }
    .meta .rule{
      width:36px;height:1px;
      background:rgba(255,255,255,0.18);
      margin:0 0 14px;
    }
    .meta .blurb{
      font:14px/1.85 "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      color:#8a93a4;
      max-width:30ch;
      white-space:pre-line;
    }
    .meta .tags{
      margin-top:18px;
      display:flex;gap:14px;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.16em;
      color:#3d4656;
      text-transform:uppercase;
    }
    .meta .tags span{position:relative}
    .meta .tags span + span::before{
      content:"";
      position:absolute;left:-8px;top:50%;
      width:1px;height:9px;background:#252b38;transform:translateY(-50%);
    }

    /* --- footer --- */
    .foot{
      margin-top:80px;
      width:min(960px,100%);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 4px;
      font:10px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.2em;
      color:#3d4656;
      text-transform:uppercase;
    }
    .foot a{color:#5a6478;text-decoration:none}
    .foot a:hover{color:#aeb8c8}

    /* --- fullscreen player overlay --- */
    #player{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.96);
      display:none;
      align-items:center;justify-content:center;
      z-index:50;
      backdrop-filter:blur(8px);
    }
    #player.on{display:flex}
    #player video{
      max-width:100vw;max-height:100vh;
      width:auto;height:100vh;
      background:#000;
    }
    #player .close{
      position:fixed;top:16px;right:20px;
      font:11px/1 "SF Mono",monospace;
      letter-spacing:0.22em;
      color:rgba(255,255,255,0.55);
      text-transform:uppercase;
      cursor:pointer;
      background:none;border:none;padding:8px 12px;
    }
    #player .close:hover{color:#fff}
  </style>
</head>
<body>

  <header class="head">
    <div class="mark">PRETEXT</div>
    <h1>WORKS</h1>
    <div class="crumbs"><a href="/demos">tech demos &rarr;</a></div>
  </header>

  <div class="gallery">

    <a class="work" href="#" data-video="/output/final/ascii_growth.mp4">
      <div class="frame">
        <video src="/output/final/ascii_growth.mp4#t=0.5" muted loop playsinline preload="metadata" autoplay></video>
        <div class="num">01</div>
        <div class="hint">play &nbsp;&rarr;</div>
      </div>
      <div class="meta">
        <div class="ji">SUI&middot;SOU</div>
        <h2>水葬</h2>
        <div class="rule"></div>
        <div class="blurb">字が水面に落ち、
ひとひらの蓮を咲かせる。
最後に、ひとつの灯。</div>
        <div class="tags">
          <span>ASCII</span>
          <span>22 sec</span>
          <span>vertical</span>
          <span>voice</span>
        </div>
      </div>
    </a>

    <a class="work" href="#" data-video="/output/final/rei_slot.mp4">
      <div class="frame">
        <video src="/output/final/rei_slot.mp4#t=20" muted loop playsinline preload="metadata" autoplay></video>
        <div class="num">02</div>
        <div class="hint">play &nbsp;&rarr;</div>
      </div>
      <div class="meta">
        <div class="ji">ICHIBAN&middot;KUJI</div>
        <h2>一番賞</h2>
        <div class="rule"></div>
        <div class="blurb">三度のレバー、三度の祈り。
「猫、竜、梟。&hairsp;違う。」
「梟、梟、梟。&hairsp;いた。」</div>
        <div class="tags">
          <span>ASCII</span>
          <span>49 sec</span>
          <span>vertical</span>
          <span>voice</span>
          <span>BGM</span>
        </div>
      </div>
    </a>

  </div>

  <footer class="foot">
    <div>&copy; pretext</div>
    <div>click any work to play with sound</div>
  </footer>

  <div id="player" role="dialog" aria-modal="true">
    <button class="close" aria-label="close">close &nbsp;&times;</button>
    <video controls playsinline></video>
  </div>

  <script>
    const overlay = document.getElementById('player');
    const overlayVideo = overlay.querySelector('video');
    const closeBtn = overlay.querySelector('.close');

    function open(src){
      overlayVideo.src = src;
      overlayVideo.currentTime = 0;
      overlayVideo.muted = false;
      overlayVideo.volume = 1.0;
      overlay.classList.add('on');
      overlayVideo.play().catch(()=>{});
    }
    function close(){
      overlay.classList.remove('on');
      overlayVideo.pause();
      overlayVideo.removeAttribute('src');
      overlayVideo.load();
    }
    document.querySelectorAll('a.work').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        open(a.dataset.video);
      });
    });
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', e => {
      if (e.target === overlay) close();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') close();
    });
  </script>

</body>
</html>
