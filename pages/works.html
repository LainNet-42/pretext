<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRETEXT</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:    #0a0a0c;
      --ink:   #ebe8e0;
      --mute:  #6b6f78;
      --faint: #2e313a;
    }
    html,body{
      background:var(--bg);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      font-feature-settings:"palt" 1;
    }
    body{min-height:100vh}

    /* ---------- tiny fixed wordmark ---------- */
    .mark{
      position:fixed;top:28px;left:32px;
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.36em;
      color:var(--mute);
      text-transform:uppercase;
      z-index:10;
    }
    .mark a{color:inherit;text-decoration:none}
    .ix{
      position:fixed;top:28px;right:32px;
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:var(--faint);
      text-transform:uppercase;
      z-index:10;
    }
    .ix a{color:var(--mute);text-decoration:none}
    .ix a:hover{color:var(--ink)}

    /* ---------- one work = one viewport band ---------- */
    .work{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:96px 32px 64px;
    }
    .work + .work{
      padding-top:32px;
    }
    .inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      max-width:min(calc(100vh * 0.56), 92vw);
      width:100%;
    }

    /* tiny label above the video — "I · 水葬" */
    .label{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.36em;
      color:var(--mute);
      text-transform:uppercase;
      align-self:flex-start;
    }

    /* video, floating, no frame */
    .frame{
      position:relative;
      width:100%;
      aspect-ratio:9/16;
      cursor:pointer;
      background:#000;
    }
    .frame video{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
      display:block;
    }

    /* subtle title below the video */
    .title{
      align-self:flex-start;
      display:flex;align-items:baseline;gap:18px;
      width:100%;
      padding-top:4px;
    }
    .title h2{
      font:300 42px/1 "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      letter-spacing:0.08em;
      color:var(--ink);
    }
    .title .year{
      font:11px/1 "SF Mono","Cascadia Code",ui-monospace,monospace;
      letter-spacing:0.22em;
      color:var(--faint);
    }

    .blurb{
      align-self:flex-start;
      font:13px/1.95 "Hiragino Mincho ProN","Yu Mincho","Songti SC","Source Han Serif",Georgia,serif;
      color:var(--mute);
      max-width:36ch;
      white-space:pre-line;
    }

    /* ---------- fullscreen player ---------- */
    #player{
      position:fixed;inset:0;
      background:#000;
      display:none;
      align-items:center;justify-content:center;
      z-index:100;
    }
    #player.on{display:flex}
    #player video{
      max-width:100vw;max-height:100vh;
      height:100vh;width:auto;
      background:#000;
    }
    #player .close{
      position:fixed;top:22px;right:26px;
      font:11px/1 "SF Mono",monospace;
      letter-spacing:0.26em;
      color:var(--mute);
      text-transform:uppercase;
      cursor:pointer;
      background:none;border:none;padding:10px 12px;
    }
    #player .close:hover{color:var(--ink)}

    @media (max-width:720px){
      .mark{top:18px;left:20px}
      .ix{top:18px;right:20px}
      .work{padding:72px 20px 48px}
      .inner{max-width:100%}
      .title h2{font-size:32px}
    }
  </style>
</head>
<body>

  <div class="mark"><a href="/">PRETEXT</a></div>
  <div class="ix"><a href="/demos">demos &rarr;</a></div>

  <section class="work">
    <div class="inner">
      <div class="label">I</div>
      <a class="frame" data-video="/output/final/ascii_growth.mp4" href="#">
        <video src="/output/final/ascii_growth.mp4#t=12" muted loop playsinline preload="metadata" autoplay></video>
      </a>
      <div class="title">
        <h2>水葬</h2>
        <div class="year">2025 &nbsp;&middot;&nbsp; 22&Prime;</div>
      </div>
      <div class="blurb">字が水面に落ち、蓮を咲かせる。</div>
    </div>
  </section>

  <section class="work">
    <div class="inner">
      <div class="label">II</div>
      <a class="frame" data-video="/output/final/rei_slot.mp4" href="#">
        <video src="/output/final/rei_slot.mp4#t=18" muted loop playsinline preload="metadata" autoplay></video>
      </a>
      <div class="title">
        <h2>一番賞</h2>
        <div class="year">2026 &nbsp;&middot;&nbsp; 49&Prime;</div>
      </div>
      <div class="blurb">三度のレバー、ひとつの出会い。</div>
    </div>
  </section>

  <div id="player" role="dialog" aria-modal="true">
    <button class="close">close &nbsp;&times;</button>
    <video controls playsinline></video>
  </div>

  <script>
    const overlay = document.getElementById('player');
    const ov = overlay.querySelector('video');
    const closeBtn = overlay.querySelector('.close');
    function open(src){
      ov.src = src;
      ov.currentTime = 0;
      ov.muted = false;
      ov.volume = 1.0;
      overlay.classList.add('on');
      ov.play().catch(()=>{});
    }
    function close(){
      overlay.classList.remove('on');
      ov.pause();
      ov.removeAttribute('src');
      ov.load();
    }
    document.querySelectorAll('a.frame').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        open(a.dataset.video);
      });
    });
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
  </script>

</body>
</html>
